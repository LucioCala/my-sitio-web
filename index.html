<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mensaje de Fe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
color:white;
text-align:center;
overflow:hidden;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1e3c72);
background-size:400% 400%;
animation:fondoAnimado 15s ease infinite;
}

body::before{
content:"";
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,rgba(255,255,255,0.12),transparent 70%);
border-radius:50%;
top:-250px;
right:-200px;
filter:blur(120px);
}

/* estrellas más grandes */
body::after{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(white 2px,transparent 2px),
radial-gradient(white 2px,transparent 2px);
background-size:80px 80px,160px 160px;
background-position:0 0,40px 40px;
opacity:0.35;
animation:estrellas 60s linear infinite;
}

.container{
position:relative;
padding:50px;
background:rgba(255,255,255,0.08);
border-radius:25px;
backdrop-filter:blur(18px);
box-shadow:0 0 40px rgba(0,0,0,0.6);
max-width:650px;
animation:fadeIn 1.5s ease-in-out;
}

h1{
font-family:'Playfair Display',serif;
font-size:2.8rem;
margin-bottom:25px;
letter-spacing:2px;
text-shadow:0 0 15px rgba(255,255,255,0.6);
}

p{
font-size:1.2rem;
line-height:1.8;
opacity:0.95;
}

.versiculo{
margin-top:30px;
font-style:italic;
font-size:1.3rem;
color:#ffd700;
text-shadow:0 0 10px rgba(255,215,0,0.7);
}

.frase{
margin-top:40px;
font-family:'Playfair Display',serif;
font-size:1.5rem;
color:#f5e6a8;
letter-spacing:1.5px;
text-shadow:0 0 15px rgba(255,215,0,0.6);
position:relative;
padding:15px 25px;
border-top:1px solid rgba(255,215,0,0.4);
border-bottom:1px solid rgba(255,215,0,0.4);
}

.autor{
display:block;
margin-top:10px;
font-size:0.9rem;
color:#ffd700;
opacity:0.8;
letter-spacing:2px;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes fondoAnimado{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

@keyframes estrellas{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

</style>
</head>

<body>

<div class="container">

<h1>✨ Confía en el Señor ✨</h1>

<p>
Cuando sientas que todo se derrumba, recuerda que el Señor es tu fuerza.
Él nunca abandona a quienes caminan con fe.
</p>

<div class="versiculo">
“Todo lo puedo en Aquel que me fortalece.”
</div>

<div class="frase">
“Vive cada momento como si fuera el último”
<span class="autor">— Canserbero</span>
</div>

</div>

</body>
</html>
